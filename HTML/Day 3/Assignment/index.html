<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pizza Order</title>
</head>
<body>
    <h2>Pizza Order Here</h2>
    <form>

        First Name:<br>
        <input type="text"><br><br>

        Last Name:<br>
        <input type="text"><br><br>

        Email:<br>
        <input type="email"><br><br>

        Contact:<br>
        <input type="text"><br><br>

        Delivery Date:<br>
        <input type="date"><br><br>

        Size:<br>
        <input type="radio" name="size"> Small
        <input type="radio" name="size"> Medium
        <input type="radio" name="size"> Large
        <br><br>

        Select Outlet:<br>
        <select>
            <option>Select</option>
            <option>Pune</option>
            <option>Mumbai</option>
        </select>
        <br><br>

        <h3>Menu</h3>

        <input type="checkbox"> Hawaiian (₹150)<br>
        
        Quantity:
        <select>
            <option>1</option>
            <option>2</option>
        </select>
        <br><br>

        <input type="checkbox"> Pepperoni (₹140)<br>
        Quantity:
        <select>
            <option>1</option>
            <option>2</option>
        </select>
        <br><br>

        <button type="submit">Order</button>

    </form>

</body>
</html>
