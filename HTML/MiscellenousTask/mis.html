<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Navbar Clone</title>
    <style>
        :root {
            --nav-bg: #23272f;
            --text-primary: #f6f7f9;
            --text-secondary: #99a1b3;
            --search-bg: #343a46;
            --react-blue: #58c4dc;
            --font-family: 'Optimistic Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: #14171a;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 56px;
            background-color: var(--nav-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* LEFT SECTION */
        .left-section {
            display: flex;
            align-items: center;
            min-width: 200px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            color: var(--react-blue);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .version-text {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            align-items: center;
            background-color: var(--search-bg);
            height: 36px;
            flex: 1;
            max-width: 650px;
            border-radius: 9999px;
            padding: 0 16px;
            margin: 0 24px;
            cursor: text;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
            margin-right: 12px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            cursor: text;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .shortcut-container {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .shortcut {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* RIGHT SECTION */
        .right-section {
            display: flex;
            align-items: center;
            min-width: 200px;
            justify-content: flex-end;
            gap: 16px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-right: 8px;
            padding-right: 24px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--react-blue);
        }

        .icons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .icon-btn:hover {
            color: var(--react-blue);
        }

        /* Special case for SVG strokes vs fills */
        .stroke-icon svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>

    <nav class="navbar">

        <!-- LEFT -->
        <div class="left-section">
            <a href="#" class="logo-container">
                <div class="logo-icon">
                    <svg width="100%" height="100%" viewBox="-10.5 -9.45 21 18.9" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <circle cx="0" cy="0" r="2" fill="currentColor"></circle>
                        <g stroke="currentColor" stroke-width="1" fill="none">
                            <ellipse rx="10" ry="4.5"></ellipse>
                            <ellipse rx="10" ry="4.5" transform="rotate(60)"></ellipse>
                            <ellipse rx="10" ry="4.5" transform="rotate(120)"></ellipse>
                        </g>
                    </svg>
                </div>
                <span class="version-text">v19.2</span>
            </a>
        </div>

        <!-- MIDDLE: SEARCH -->
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true">
                <path
                    d="M14.386 14.386l4.0877 4.0877-4.0877-4.0877c-2.9418 2.9419-7.7115 2.9419-10.6533 0-2.9419-2.9418-2.9419-7.7115 0-10.6533 2.9418-2.9419 7.7115-2.9419 10.6533 0 2.9419 2.9418 2.9419 7.7115 0 10.6533z"
                    stroke="currentColor" fill="none" fill-rule="evenodd" stroke-linecap="round"
                    stroke-linejoin="round"></path>
            </svg>
            <input type="text" class="search-input" placeholder="Search">
            <div class="shortcut-container">
                <span class="shortcut">Ctrl</span>
                <span class="shortcut">K</span>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right-section">
            <div class="nav-links">
                <a href="#" class="nav-link">Learn</a>
                <a href="#" class="nav-link">Reference</a>
                <a href="#" class="nav-link">Community</a>
                <a href="#" class="nav-link">Blog</a>
            </div>

            <div class="icons">
                <button class="icon-btn" aria-label="Theme">
                    <!-- Sun Icon -->
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75zM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59zM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75zM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75zM6.166 17.834a.75.75 0 0 0-1.06 1.06l1.59 1.591a.75.75 0 1 0 1.061-1.06l-1.59-1.591zM4.5 12a.75.75 0 0 1-.75.75H1.5a.75.75 0 0 1 0-1.5h2.25a.75.75 0 0 1 .75.75zM5.106 6.166a.75.75 0 0 0 1.06-1.06l-1.591-1.59a.75.75 0 1 0-1.06 1.061l1.591 1.59z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" aria-label="Translate">
                    <!-- Translate / Languages Icon -->
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04M18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12m-2.62 7l1.62-4.33L19.12 17h-3.24z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" aria-label="GitHub">
                    <!-- GitHub Icon -->
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

    </nav>

</body>

</html>
